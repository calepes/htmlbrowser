<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nested Spec</title>
    <style>
      body {
        margin: 0;
        background: #fafaf7;
        color: #1a1a1a;
        font-family: -apple-system, ui-sans-serif, system-ui, sans-serif;
        padding: 48px;
      }
      .wrap { max-width: 640px; margin: 0 auto; }
      h1 { margin: 0 0 8px; }
      .crumb { color: #666; font-size: 12px; font-family: ui-monospace, Menlo, monospace; margin-bottom: 24px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #e5e5e0; }
      th { background: #f0eee8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="crumb">examples / nested / deep-spec.html</div>
      <h1>Nested directory test</h1>
      <p>If you can see this, the sidebar tree expanded correctly.</p>

      <table>
        <thead>
          <tr><th>Field</th><th>Type</th><th>Required</th></tr>
        </thead>
        <tbody>
          <tr><td>id</td><td>uuid</td><td>yes</td></tr>
          <tr><td>email</td><td>string</td><td>yes</td></tr>
          <tr><td>created_at</td><td>timestamp</td><td>yes</td></tr>
          <tr><td>display_name</td><td>string</td><td>no</td></tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
