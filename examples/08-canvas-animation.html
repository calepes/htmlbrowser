<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>08 · Canvas Animation</title>
    <style>
      body {
        margin: 0;
        background: #0c0c0e;
        color: #f5f5f7;
        font-family: -apple-system, ui-sans-serif, system-ui, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .stage { text-align: center; }
      h1 { margin: 0 0 8px; font-size: 22px; font-weight: 600; }
      .meta { color: #888; font-size: 13px; margin-bottom: 24px; }
      canvas {
        display: block;
        margin: 0 auto;
        border-radius: 12px;
        background: #050507;
        border: 1px solid #1a1a1d;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <h1>Canvas particles</h1>
      <div class="meta">JS-driven canvas. Empty canvas in Safe mode; animated dots in Trusted.</div>
      <canvas id="c" width="540" height="320"></canvas>
    </div>
    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const W = canvas.width;
      const H = canvas.height;
      const dots = Array.from({ length: 80 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 1.2,
        vy: (Math.random() - 0.5) * 1.2,
        r: 1.5 + Math.random() * 2,
      }));
      function frame() {
        ctx.fillStyle = "rgba(5,5,7,0.25)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#22c55e";
        for (const d of dots) {
          d.x += d.vx;
          d.y += d.vy;
          if (d.x < 0 || d.x > W) d.vx *= -1;
          if (d.y < 0 || d.y > H) d.vy *= -1;
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(frame);
      }
      frame();
    </script>
  </body>
</html>
