<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>02 · CSS Animation</title>
    <style>
      body {
        margin: 0;
        background: #0c0c0e;
        color: #f5f5f7;
        font-family: -apple-system, ui-sans-serif, system-ui, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .scene {
        text-align: center;
      }
      .pulse {
        width: 160px;
        height: 160px;
        margin: 0 auto 24px;
        border-radius: 50%;
        background: radial-gradient(circle, #22c55e 0%, #15803d 70%, transparent 100%);
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(0.85); opacity: 0.7; }
        50% { transform: scale(1.05); opacity: 1; }
      }
      .bars {
        display: flex;
        gap: 6px;
        justify-content: center;
        margin-top: 32px;
        height: 60px;
        align-items: end;
      }
      .bar {
        width: 8px;
        background: #f5f5f7;
        border-radius: 2px;
        animation: bounce 1.2s ease-in-out infinite;
      }
      .bar:nth-child(2) { animation-delay: 0.1s; }
      .bar:nth-child(3) { animation-delay: 0.2s; }
      .bar:nth-child(4) { animation-delay: 0.3s; }
      .bar:nth-child(5) { animation-delay: 0.4s; }
      @keyframes bounce {
        0%, 100% { height: 12px; }
        50% { height: 60px; }
      }
      h1 { font-weight: 600; letter-spacing: -0.01em; margin: 0; }
      .meta { color: #888; font-size: 13px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="pulse"></div>
      <h1>CSS-only animation</h1>
      <div class="meta">No JS. Should animate in both Safe and Trusted modes.</div>
      <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </body>
</html>
